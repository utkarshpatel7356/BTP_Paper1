data:
  index_ticker: "^GSPC"
  sp500_wiki_url: "https://en.wikipedia.org/wiki/List_of_S%26P_500_companies"
  start_date: "2019-01-01"
  end_date: "2024-12-31"
  train_years: 5
  test_months: 6
  raw_dir: "data/raw"
  processed_dir: "data/processed"

graph:
  corr_window: 60          # rolling window (days) for correlation edges
  corr_threshold: 0.30     # minimum abs correlation to keep an edge
  use_granger: false       # intra-sector Granger edges (slow — enable after testing)
  granger_maxlag: 5
  granger_pvalue: 0.05
  use_sector: true         # add intra-sector edges

model:
  gnn_hidden: 64
  gnn_heads: 4
  gnn_layers: 2
  gru_window: 20           # temporal lookback (trading days) — reduced for T4 GPU
  dropout: 0.1
  lr: 0.001
  diversity_lambda: 0.1    # embedding diversity regularisation (NEW)
  epochs: 100
  batch_size: 1
  device: "cuda"           # Tesla T4 GPU

selection:
  k: 50                    # subset size
  alpha_shap: 0.4          # weight on RF-SHAP in three-way fusion
  beta_emb_shap: 0.4       # weight on embedding-SHAP (NEW)
  # influence gets 1 - alpha - beta = 0.2
  min_per_sector: 1        # minimum stocks per GICS sector
  ridge_alpha: 1.0         # L2 regularisation for embedding regressor

allocation:
  lambda_reg: 0.01         # GNN edge-attention regularisation in QP
  max_weight: 0.10         # maximum individual stock weight
  solver: "OSQP"           # cvxpy solver

evaluation:
  rebalance_freq: "Q"      # quarterly rebalance
  metrics: ["tracking_error", "info_ratio", "cumulative_return", "max_drawdown"]

outputs:
  figures_dir: "outputs/figures"
  results_dir: "outputs/results"
